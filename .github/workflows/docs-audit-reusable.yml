name: Docs Audit (Reusable)

on:
  workflow_call:
    inputs:
      scope:
        description: "Narrow the audit scope (blank = full audit)"
        required: false
        default: ""
        type: string
      extra_instructions:
        description: "Additional instructions for Claude"
        required: false
        default: ""
        type: string
      max_turns:
        description: "Max Claude turns"
        required: false
        default: 60
        type: number
      timeout_minutes:
        description: "Job timeout in minutes"
        required: false
        default: 45
        type: number
      anthropic_url_base:
        description: "Primary Anthropic API URL"
        required: true
        type: string
      anthropic_url_fallback:
        description: "Fallback Anthropic API URL"
        required: false
        default: ""
        type: string
      anthropic_model_base:
        description: "Model to use with base endpoint"
        required: false
        default: ""
        type: string
      anthropic_model_fallback:
        description: "Model to use with fallback endpoint"
        required: false
        default: ""
        type: string
      mcp_server_url:
        description: "AgentiBridge MCP server URL (blank = skip)"
        required: false
        default: ""
        type: string
    secrets:
      RELEASE_TOKEN:
        description: "PAT for pushing branches and creating PRs"
        required: false
      ANTHROPIC_TOKEN_BASE:
        description: "API key for the base Anthropic endpoint"
        required: true
      ANTHROPIC_TOKEN_FALLBACK:
        description: "API key for the fallback Anthropic endpoint"
        required: false
      MCP_API_KEY:
        description: "API key for AgentiBridge MCP server"
        required: false
      CF_ACCESS_CLIENT_ID:
        description: "Cloudflare Access service token client ID"
        required: false
      CF_ACCESS_CLIENT_SECRET:
        description: "Cloudflare Access service token client secret"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  docs-audit:
    runs-on: anton
    timeout-minutes: ${{ inputs.timeout_minutes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create audit branch
        id: branch
        run: |
          BRANCH="docs/audit-$(date +%Y%m%d%H%M)"
          git checkout -b "$BRANCH"
          echo "name=${BRANCH}" >> "$GITHUB_OUTPUT"

      # ── Probe Anthropic endpoints (BASE → FALLBACK → fail) ──────────────────
      - name: Probe Anthropic endpoints
        id: anthropic
        env:
          BASE_URL: ${{ inputs.anthropic_url_base }}
          FALLBACK_URL: ${{ inputs.anthropic_url_fallback }}
          CF_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          # Build CF Access headers if available
          CF_HEADERS=""
          if [[ -n "$CF_CLIENT_ID" && -n "$CF_CLIENT_SECRET" ]]; then
            CF_HEADERS="-H CF-Access-Client-Id:${CF_CLIENT_ID} -H CF-Access-Client-Secret:${CF_CLIENT_SECRET}"
          fi

          echo "Probing BASE: ${BASE_URL}"
          HTTP_CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" $CF_HEADERS "${BASE_URL}/v1/models" 2>/dev/null || true)
          echo "  HTTP status: ${HTTP_CODE}"

          if [[ "$HTTP_CODE" =~ ^(200|401|403|404)$ ]]; then
            echo "selected=base" >> "$GITHUB_OUTPUT"
            echo "url=${BASE_URL}" >> "$GITHUB_OUTPUT"
            echo "model=${{ inputs.anthropic_model_base }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "BASE unreachable, trying FALLBACK: ${FALLBACK_URL}"
          HTTP_CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" $CF_HEADERS "${FALLBACK_URL}/v1/models" 2>/dev/null || true)
          echo "  HTTP status: ${HTTP_CODE}"

          if [[ "$HTTP_CODE" =~ ^(200|401|403|404)$ ]]; then
            echo "selected=fallback" >> "$GITHUB_OUTPUT"
            echo "url=${FALLBACK_URL}" >> "$GITHUB_OUTPUT"
            echo "model=${{ inputs.anthropic_model_fallback }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Both Anthropic endpoints unreachable"
          exit 1

      # ── Resolve API key for selected endpoint ────────────────────────────────
      - name: Resolve API key
        id: resolve_key
        env:
          TOKEN_BASE: ${{ secrets.ANTHROPIC_TOKEN_BASE }}
          TOKEN_FALLBACK: ${{ secrets.ANTHROPIC_TOKEN_FALLBACK }}
        run: |
          if [ "${{ steps.anthropic.outputs.selected }}" = "base" ]; then
            echo "api_key=${TOKEN_BASE}" >> "$GITHUB_OUTPUT"
          else
            echo "api_key=${TOKEN_FALLBACK}" >> "$GITHUB_OUTPUT"
          fi

      # ── Check AgentiBridge MCP health (non-fatal) ────────────────────────────
      - name: Check AgentiBridge MCP health
        id: mcp_health
        env:
          MCP_URL: ${{ inputs.mcp_server_url }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
          CF_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          if [[ -z "$MCP_URL" ]]; then
            echo "MCP_SERVER_URL not set — skipping"
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CF_HEADERS=""
          if [[ -n "$CF_CLIENT_ID" && -n "$CF_CLIENT_SECRET" ]]; then
            CF_HEADERS="-H CF-Access-Client-Id:${CF_CLIENT_ID} -H CF-Access-Client-Secret:${CF_CLIENT_SECRET}"
          fi
          HEALTH_URL="${MCP_URL%/mcp}/health"
          HTTP_CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" \
            -H "X-API-Key: ${MCP_API_KEY}" $CF_HEADERS "${HEALTH_URL}" 2>/dev/null || true)
          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "AgentiBridge reachable"
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::AgentiBridge not reachable (HTTP ${HTTP_CODE}) — audit continues using local files only"
            echo "reachable=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Generate .mcp.json (only if MCP server is reachable) ─────────────────
      - name: Generate .mcp.json
        if: steps.mcp_health.outputs.reachable == 'true'
        env:
          MCP_URL: ${{ inputs.mcp_server_url }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
        run: |
          jq -n --arg url "$MCP_URL" --arg key "$MCP_API_KEY" \
            '{mcpServers:{"agentibridge":{type:"http",url:$url,headers:{"X-API-Key":$key}}}}' \
            > .mcp.json
          echo "Generated .mcp.json"

      # ── Install Claude CLI ───────────────────────────────────────────────────
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      # ── Build Claude prompt ──────────────────────────────────────────────────
      - name: Build audit prompt
        env:
          AUDIT_BRANCH: ${{ steps.branch.outputs.name }}
          AUDIT_SCOPE: ${{ inputs.scope }}
          EXTRA_INSTRUCTIONS: ${{ inputs.extra_instructions }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 << 'PYEOF'
          import os

          branch = os.environ["AUDIT_BRANCH"]
          scope = os.environ.get("AUDIT_SCOPE", "").strip()
          extra = os.environ.get("EXTRA_INSTRUCTIONS", "").strip()
          run_url = os.environ["RUN_URL"]

          scope_note = f"\nSCOPE RESTRICTION: Only audit: {scope}. Skip all other files.\n" if scope else ""
          extra_note = f"\nEXTRA INSTRUCTIONS FROM OPERATOR: {extra}\n" if extra else ""

          prompt = f"""You are a documentation auditor. Your job is to find discrepancies between documentation files and actual source code, fix them in-place, and create a pull request — but ONLY if you actually made changes.
          {scope_note}{extra_note}
          ## STEP 1: DISCOVER PROJECT STRUCTURE

          1. Read README.md and any CLAUDE.md / CONTRIBUTING.md to understand the project
          2. List all source code modules (*.py, *.ts, *.go, etc.)
          3. List all documentation files (docs/, README.md, CLAUDE.md, CONTRIBUTING.md, etc.)

          ## STEP 2: FORENSIC AUDIT

          For each documentation file, read it alongside the corresponding source code and note every discrepancy:
          - Wrong values, stale descriptions, missing items
          - Docs for features/commands/env vars that no longer exist in the code
          - Undocumented features/commands/env vars that do exist in the code
          - Wrong counts (e.g. "11 tools" when there are actually 12)
          - Wrong defaults, wrong module names, wrong file paths

          Key things to cross-reference:
          - Environment variables in docs vs actual os.environ/os.getenv calls in code
          - CLI commands/flags in docs vs actual argument parser definitions
          - Module/file tables in docs vs actual directory listings
          - Tool/API counts in docs vs actual definitions in code
          - Workflow tables in docs vs actual .github/workflows/ files

          ## STEP 3: MAKE FIXES

          For every discrepancy found, edit the file directly. Rules:
          - Remove docs for things that no longer exist in the code
          - Add docs for undocumented things that do exist in the code
          - Correct wrong values, counts, and defaults
          - Preserve existing writing style, heading structure, and tone
          - DO NOT make stylistic changes to correct sections

          ## STEP 4: CHECK FOR CHANGES

          Run: git diff --stat

          If there are no changed files, print exactly: NO_CHANGES_MADE
          Then stop — do not proceed to Step 5.

          ## STEP 5: COMMIT AND CREATE PR

          Run in order:
            git add -A
            git diff --cached --stat
            git commit -m "docs: audit corrections — sync docs with codebase"
            git push origin {branch}

          Then create the PR:
            gh pr create \\
              --title "docs: automated audit corrections ($(date +%Y-%m-%d))" \\
              --body "## Summary

          Automated documentation audit — fixes discrepancies between doc files and source code.

          ### What was fixed
          - (list each actual change made)

          ### What was NOT changed
          Only factual discrepancies were corrected. No stylistic rewrites.

          ---
          Generated by docs-audit workflow · [Workflow run]({run_url})"

          After the PR is created, print the PR URL on a line starting with: PR_URL:
          """

          with open("/tmp/audit-prompt.txt", "w") as f:
              f.write(prompt)
          print(f"Prompt written ({len(prompt)} chars)")
          PYEOF

      # ── Run docs audit ───────────────────────────────────────────────────────
      - name: Build custom headers
        id: headers
        env:
          CF_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          if [[ -n "$CF_CLIENT_ID" && -n "$CF_CLIENT_SECRET" ]]; then
            echo "value=CF-Access-Client-Id: ${CF_CLIENT_ID},CF-Access-Client-Secret: ${CF_CLIENT_SECRET}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run docs audit
        env:
          ANTHROPIC_API_KEY: ${{ steps.resolve_key.outputs.api_key }}
          ANTHROPIC_BASE_URL: ${{ steps.anthropic.outputs.url }}
          ANTHROPIC_CUSTOM_HEADERS: ${{ steps.headers.outputs.value }}
          CLAUDE_MODEL: ${{ steps.anthropic.outputs.model }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          echo "Endpoint: ${ANTHROPIC_BASE_URL}"
          echo "Model:    ${CLAUDE_MODEL}"
          echo ""
          claude \
            --dangerously-skip-permissions \
            --output-format text \
            --max-turns ${{ inputs.max_turns }} \
            ${CLAUDE_MODEL:+--model "$CLAUDE_MODEL"} \
            -p "$(cat /tmp/audit-prompt.txt)"
